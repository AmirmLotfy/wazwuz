<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c7ff38",
                        "background-light": "#f8f8f5",
                        "background-dark": "#0e0d0b",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["IBM Plex Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0e0d0b;
            color: #f8f8f5;
            font-family: 'Space Grotesk', sans-serif;
        }
        .waveform-bar {
            width: 3px;
            background-color: #c7ff38;
            border-radius: 99px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-6 py-4 border-b border-white/10 z-20 bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">auto_awesome</span>
</div>
<h1 class="text-xl font-bold tracking-tight font-display uppercase">Wazwuz <span class="text-[10px] font-mono border border-primary text-primary px-1 ml-1 rounded">LIVE</span></h1>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex gap-2 mr-4">
<button class="flex items-center justify-center rounded-lg h-10 px-4 bg-white/5 hover:bg-white/10 text-white transition-colors border border-white/10">
<span class="material-symbols-outlined mr-2 text-sm">auto_fix</span>
<span class="text-xs font-mono">CLEANER</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 px-4 bg-white/5 hover:bg-white/10 text-white transition-colors border border-white/10">
<span class="material-symbols-outlined mr-2 text-sm">trending_up</span>
<span class="text-xs font-mono">TRENDIER</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 px-4 bg-primary/20 text-primary transition-colors border border-primary/30">
<span class="material-symbols-outlined mr-2 text-sm">workspace_premium</span>
<span class="text-xs font-mono">PREMIUM</span>
</button>
</div>
<button class="size-10 flex items-center justify-center rounded-full bg-white/10">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="size-10 rounded-full border border-primary/50 p-0.5">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="User profile avatar" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBKiXYkztoWNDIrI1N53hv3raKxmg4k4LZaIU-E0DpPNVN14Yv_tkpbToEtvOeD1PRHp801261qq5gI2rf7nWWxiGOvUncQeeJwugPfwQ7Ai6RZwI85CVDeu3vqWYpfEhrHL0uWI1k2l192a3fJ-VXTnSmhzyA4nmuV6Cvcd3vJ5kkp-adQufya-M9UZq-3pg_Z__dvVw_dikqbg7sLHOhw3Vm_HLXumMFkmSR75-LSLr-HqxJ69KlC7fvGYuuyKRVv5jdNBS9KaqU-')"></div>
</div>
</div>
</header>
<!-- Main Camera Viewport -->
<main class="relative flex-1 w-full bg-black overflow-hidden flex items-center justify-center">
<!-- Background Live Feed Placeholder -->
<div class="absolute inset-0 bg-cover bg-center opacity-60" data-alt="High-end fashion editorial portrait background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAp8R497fP4ptyG3KOnj8Q5clyWqQNTcm-YOD6zMdV6O8P3LMLCa2UpgN2bMyEt5CbFW9hNpfmQyKJfXRIJZASy1edu8klAX8mUWSfRrk_XBKEEd_7Dm2ttP5sE91e8hCxkQ3mLoMtcVZ0EVRywrXrG9AX064KYnAWLcBHplIDGkOD_sUZoWGhuV7VW7MhXJYhcuttUEsDJ_w50N2j-iWuLa_n8j-q6EkeGN-6LnPoavpKag6eDM521_Qe_k1AsaQHHanpEHrA7sIPz')"></div>
<!-- Framing Overlays -->
<div class="absolute inset-0 pointer-events-none">
<!-- Rule of Thirds -->
<div class="grid grid-cols-3 h-full w-full opacity-20 border-white/20">
<div class="border-r border-b border-white"></div>
<div class="border-r border-b border-white"></div>
<div class="border-b border-white"></div>
<div class="border-r border-b border-white"></div>
<div class="border-r border-b border-white"></div>
<div class="border-b border-white"></div>
<div class="border-r border-white"></div>
<div class="border-r border-white"></div>
<div></div>
</div>
<!-- Golden Ratio Overlay (Abstract representation) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80%] aspect-[1.618] border border-primary/30 rounded-xl"></div>
</div>
<!-- AI Assistant UI -->
<div class="absolute inset-x-0 top-10 flex flex-col items-center gap-4 z-10 px-6">
<div class="bg-black/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4 flex flex-col items-center max-w-md w-full shadow-2xl">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary text-xl animate-pulse">record_voice_over</span>
<span class="text-xs font-mono tracking-widest text-primary uppercase">Assistant Live</span>
</div>
<h2 class="text-2xl font-display font-bold text-white text-center mb-4">"Tilt left... Hold there"</h2>
<!-- Waveform -->
<div class="flex items-center justify-center gap-1 h-8 w-full">
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-7"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-2"></div>
</div>
<p class="text-[10px] font-mono text-white/40 mt-3 uppercase tracking-tighter">Composition guidance active</p>
</div>
</div>
<!-- Composition Chips -->
<div class="absolute bottom-32 left-0 right-0 flex justify-center gap-3 px-4 z-10">
<button class="bg-black/60 backdrop-blur-md text-white border border-white/20 px-4 py-2 rounded-full flex items-center gap-2 hover:border-primary transition-all">
<span class="material-symbols-outlined text-sm">aspect_ratio</span>
<span class="text-xs font-mono font-medium">4:5 post</span>
</button>
<button class="bg-primary text-black px-4 py-2 rounded-full flex items-center gap-2 font-bold shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-sm">crop_portrait</span>
<span class="text-xs font-mono font-bold">9:16 cover</span>
</button>
<button class="bg-black/60 backdrop-blur-md text-white border border-white/20 px-4 py-2 rounded-full flex items-center gap-2 hover:border-primary transition-all">
<span class="material-symbols-outlined text-sm">shopping_bag</span>
<span class="text-xs font-mono font-medium">product photo</span>
</button>
<button class="bg-black/60 backdrop-blur-md text-white border border-white/20 px-4 py-2 rounded-full flex items-center gap-2 hover:border-primary transition-all">
<span class="material-symbols-outlined text-sm">face</span>
<span class="text-xs font-mono font-medium">beauty portrait</span>
</button>
</div>
<!-- Bottom Control Panel -->
<div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black via-black/80 to-transparent p-8 flex flex-col items-center gap-6">
<div class="flex items-center justify-center gap-12 w-full max-w-4xl">
<!-- Left Options -->
<div class="flex flex-col gap-3 items-end flex-1">
<button class="flex items-center gap-2 text-white/60 hover:text-white transition-colors group">
<span class="text-[10px] font-mono uppercase tracking-widest">Match Reference</span>
<span class="material-symbols-outlined text-xl group-hover:text-primary">photo_library</span>
</button>
<button class="flex items-center gap-2 text-white/60 hover:text-white transition-colors group">
<span class="text-[10px] font-mono uppercase tracking-widest">Master Look</span>
<span class="material-symbols-outlined text-xl group-hover:text-primary">magic_button</span>
</button>
</div>
<!-- Center Capture Button -->
<div class="relative group">
<div class="absolute -inset-4 bg-primary/20 rounded-full blur-xl group-hover:bg-primary/30 transition-all"></div>
<button class="relative size-24 rounded-full border-4 border-white flex items-center justify-center bg-transparent active:scale-95 transition-transform overflow-hidden">
<div class="size-20 rounded-full bg-white group-hover:bg-primary transition-colors"></div>
</button>
<div class="absolute -bottom-10 left-1/2 -translate-x-1/2 whitespace-nowrap">
<span class="text-xs font-mono font-bold uppercase tracking-[0.2em] text-white">Capture when ready</span>
</div>
</div>
<!-- Right Metadata -->
<div class="flex flex-col gap-1 items-start flex-1">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm">shutter_speed</span>
<span class="text-[10px] font-mono">1/250s</span>
</div>
<div class="flex items-center gap-2 text-white/40">
<span class="material-symbols-outlined text-sm">iso</span>
<span class="text-[10px] font-mono">ISO 100</span>
</div>
<div class="flex items-center gap-2 text-white/40">
<span class="material-symbols-outlined text-sm">camera</span>
<span class="text-[10px] font-mono">f/1.8</span>
</div>
</div>
</div>
</div>
<!-- Floating Status -->
<div class="absolute top-24 left-6 flex flex-col gap-4">
<div class="bg-black/40 backdrop-blur-md border border-white/10 p-3 rounded-lg flex flex-col gap-2">
<div class="flex items-center gap-2">
<div class="size-2 rounded-full bg-red-500 animate-pulse"></div>
<span class="text-[10px] font-mono font-bold text-white uppercase">REC 4K 60</span>
</div>
<div class="text-[10px] font-mono text-white/40">00:12:45:03</div>
</div>
</div>
<!-- Suggestion Sidebar -->
<div class="absolute right-6 top-24 flex flex-col gap-4 w-48">
<div class="bg-black/40 backdrop-blur-md border border-white/10 p-4 rounded-xl">
<div class="text-[10px] font-mono text-primary uppercase mb-2">Suggestions</div>
<ul class="flex flex-col gap-3">
<li class="flex flex-col gap-1">
<span class="text-[11px] font-display font-medium text-white">Soft lighting mode</span>
<div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary w-3/4"></div>
</div>
</li>
<li class="flex flex-col gap-1">
<span class="text-[11px] font-display font-medium text-white">Symmetry check</span>
<div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/2"></div>
</div>
</li>
</ul>
</div>
</div>
</main>
</div>
</body></html>
