<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c7ff38", // Acid Chartreuse
                        "accent": "#E97451",  // Burnt Coral
                        "background-light": "#f8f8f5",
                        "background-dark": "#12140e",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

        }

<style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel {
            background: rgba(29, 35, 15, 0.8);
            backdrop-filter: blur(12px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

            background: #353a27;

<div class="fixed inset-0 z-0 flex items-center justify-center overflow-hidden opacity-30 grayscale pointer-events-none">

<span class="material-symbols-outlined text-primary">add_photo_alternate</span>

<button class="p-2 hover:bg-slate-800 rounded-lg transition-colors">

</header>
<div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
<!-- Upload & URL Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div class="group relative flex flex-col items-center justify-center border-2 border-dashed border-slate-700 hover:border-primary/50 bg-slate-900/40 rounded-xl p-8 transition-all cursor-pointer">
<div class="mb-3 p-3 bg-primary/10 rounded-full group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">upload_file</span>
</div>
<p class="text-sm font-medium text-slate-100">Drop images here</p>

<button class="mt-4 text-xs font-bold uppercase tracking-widest text-primary hover:underline">Browse Files</button>
</div>

<label class="text-xs font-bold uppercase tracking-widest text-slate-500">Quick Actions</label>
<button class="w-full flex items-center gap-3 px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors border border-slate-700">
<span class="material-symbols-outlined text-accent text-sm">screenshot_region</span>
<span class="text-sm font-medium">Capture Screenshot</span>
</button>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-500">Paste Source URL</label>
<div class="relative">
<input class="w-full bg-slate-900 border border-slate-700 rounded-lg py-3 px-4 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-600" placeholder="Pinterest, Instagram, Behance..." type="text"/>
<div class="absolute right-3 top-3 flex items-center gap-1">
<span class="material-symbols-outlined text-slate-500 text-sm animate-spin">sync</span>
</div>
</div>
<p class="text-[10px] text-slate-500 flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]">info</span>

                            </p>
</div>
</div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-500">Reference Note</label>
<textarea class="w-full bg-slate-900 border border-slate-700 rounded-lg py-3 px-4 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all resize-none" placeholder="e.g. Use only the lighting and color palette..." rows="3"></textarea>
</div>
<div class="space-y-4">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-500">Save To</label>
<select class="w-full bg-slate-900 border border-slate-700 rounded-lg py-3 px-4 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all appearance-none">

<option>Moodboard: Summer Vibes</option>
<option>+ Create New Moodboard</option>

</div>
<div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg border border-slate-800">
<div class="flex flex-col">
<span class="text-xs font-bold uppercase tracking-widest text-slate-300">Analyze on add</span>
<span class="text-[10px] text-slate-500">Auto-tag colors and styles</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</div>

</div>

<div class="flex gap-3">
