<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wazwuz - Add References</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c7ff38",
                        "background-light": "#f8f8f5",
                        "background-dark": "#12140a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["IBM Plex Mono", "monospace"]

                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

            },

<style>

            background: rgba(18, 20, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(199, 255, 56, 0.1);
        }
        .glow-subtle {
            box-shadow: 0 0 15px rgba(199, 255, 56, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<!-- Blurred Studio Background Simulation -->

<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-primary/10 blur-[100px] rounded-full"></div>
<div class="absolute top-[20%] right-[10%] w-[20%] h-[20%] bg-primary/5 blur-[80px] rounded-full"></div>

</div>
<!-- Modal Overlay Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background-dark/60 backdrop-blur-sm">
<!-- Premium Modal -->
<div class="glass-panel w-full max-w-[640px] rounded-xl overflow-hidden shadow-2xl flex flex-col">
<!-- Modal Header -->

<div class="flex flex-col gap-1">
<span class="font-mono text-[10px] uppercase tracking-widest text-primary/80">Asset Pipeline</span>
<h2 class="text-3xl font-bold tracking-tight">Add References</h2>
</div>
<button class="p-2 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-400">close</span>
</button>
</div>
<div class="px-8 pb-8 flex flex-col gap-6">
<!-- Drag-and-Drop Zone -->

<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">upload_file</span>
</div>
<div class="text-center">
<p class="text-lg font-bold leading-tight tracking-tight">Drop to add</p>
<p class="text-slate-400 text-sm font-normal mt-1">PNG, JPG, SVG up to 50MB or <span class="text-primary underline decoration-primary/30 underline-offset-4">browse files</span></p>
</div>
</div>

<div class="flex flex-col gap-2">
<label class="font-mono text-[10px] uppercase tracking-wider text-slate-400 px-1">Paste URL</label>
<div class="relative group">
<input class="w-full h-12 bg-white/5 border border-white/10 rounded-lg px-4 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-500" placeholder="https://unsplash.com/photos/..." value="https://assets.studio/lighting-ref-01"/>
<div class="absolute right-3 top-3.5 h-5 w-5 bg-primary rounded-full flex items-center justify-center opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[14px] text-background-dark font-bold">check</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-mono text-[10px] uppercase tracking-wider text-slate-400 px-1">Internal Note</label>
<input class="w-full h-12 bg-white/5 border border-white/10 rounded-lg px-4 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-500" placeholder="Use only the lighting"/>
</div>
</div>
<!-- Analysis State (Active) -->
<div class="flex flex-col gap-3 p-4 bg-primary/5 rounded-lg border border-primary/10 glow-subtle">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm animate-pulse">sync</span>
<p class="text-primary text-sm font-medium tracking-wide">Parsing link...</p>
</div>
<p class="text-primary/60 font-mono text-[11px]">82% COMPLETE</p>
</div>
<div class="h-1.5 w-full bg-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-primary" style="width: 82%;"></div>
</div>
<p class="text-slate-400 text-[11px] font-mono leading-relaxed">EXTRACTING METADATA: LENS_FLARE, VOLUMETRIC_FOG</p>
</div>
<!-- Toggle Area -->
<div class="flex items-center justify-between px-1">
<div class="flex flex-col">
<span class="text-sm font-medium">Analyze on add</span>
<span class="text-xs text-slate-500">Automatically tag visual properties</span>
</div>
<div class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary cursor-pointer">
<span class="inline-block h-4 w-4 translate-x-6 rounded-full bg-background-dark transition-transform"></span>
</div>
</div>
<!-- Recent References -->
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between px-1">
<h3 class="font-mono text-[10px] uppercase tracking-widest text-slate-400">Recent References</h3>
<a class="text-[10px] text-primary hover:underline uppercase tracking-tighter" href="#">View Library</a>
</div>
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
<div class="relative min-w-[100px] h-[100px] rounded-lg overflow-hidden group border border-white/5">
<img alt="" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" data-alt="Abstract blue and purple fluid motion" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-aK9S1U3fenpBx8IqG8HMgdvrm8SFlO90ZTGGR6evQb5ZYpi4Z8GZcy1P2VomlhMi1Culul8S60B6592O3kVEys5vur9nOPVaAlEpaLH2wG0bo74TkLJYgHra08FkQBBl4YRs7JCBVgRgKmGlIBiZqCfYA5mDx50GGEAi2ei5Zj2LRUwEQgTtNcKWnef7UYIL67LtZAxNKTbTYKI0VyNKkQDvHQUw7yu4-x0sdlMJ2xQfRyQtHNSZ3Jb4z01ndG5SiaeHtpoLW0u6"/>

</div>
<div class="relative min-w-[100px] h-[100px] rounded-lg overflow-hidden group border border-white/5">
<img alt="" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" data-alt="Deep dark emerald wavy patterns" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAD3TIETy65ZV-scPzQ3rQ4lpwy5RUgMtEbYTzctl60Nt8cLzzYXVvZen4OzbNconZ1rh7KW05ezL5BOU4KbUIXsSVMdwMGs-HgzBRDAZAl6cGQFs4b7H9h7CPYGN6Ws7T2shlr_feHhmbS2J_QeEe2NoQvtGk9EvnxxyKevfgWSCmR3Cv7XNotuuR9OwHkPLKZLp2U-vJwGIY8MsCeR8VGu-wkHMJEih5QwyPEne745tzKiBimcB6gsVyVnOIyu1DV6fHs2dglpT1G"/>
<div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
<div class="relative min-w-[100px] h-[100px] rounded-lg border border-dashed border-white/10 flex items-center justify-center bg-white/5 hover:bg-white/10 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-slate-600 group-hover:text-primary">add</span>
</div>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-8 py-6 bg-white/5 border-t border-white/5 flex items-center justify-end gap-3">
<button class="px-6 h-11 rounded-lg text-sm font-medium text-slate-400 hover:text-white transition-colors">
                    Discard
                </button>
<button class="bg-primary hover:bg-primary/90 text-background-dark px-8 h-11 rounded-lg text-sm font-bold tracking-tight transition-all shadow-lg shadow-primary/20 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">auto_fix_high</span>
                    Add to Project
                </button>
</div>
</div>
</div>
