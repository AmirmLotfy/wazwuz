<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wazwuz Compare Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c7ff38",
                        "background-light": "#f8f8f5",
                        "background-dark": "#1d230f",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .compare-slider {
            position: relative;
            overflow: hidden;
        }
        .compare-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            border-right: 2px solid #c7ff38;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between border-b border-primary/10 px-6 py-4 lg:px-12">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">filter_tilt_shift</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Wazwuz Compare</h2>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex flex-col items-end mr-2">
<span class="text-xs uppercase tracking-widest text-slate-400">Project</span>
<span class="text-sm font-medium">Summer Campaign 2024</span>
</div>
<button class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-800 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-white">close</span>
</button>
<div class="h-10 w-10 rounded-full border-2 border-primary/20 bg-cover bg-center" data-alt="User profile avatar portrait" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC1-jB5KVMWRBNaUqUW52smGN4pS-6kHBcthoIoG6rSnLpG3bnuFyUDYk4Z-y1FlYmkPOBOvz7QuIgkMRGm6lq8aYINcx0rJ8yW3tT71Qb-wN6w9GujIJp5klYfjOxQeMNuurSH1EqMV87Dtkjy-tDM7XMSon-7Je-EpIddzEDxby8UT1tzj6I-sLySAAeF_pE2WxeGR0W9FVevSY5pnFpzNwq19jVsmOkXD6KClcdnQkZ14FPePiOF732l61qX4MdKlQ3Flm1OEqxx");'></div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 py-6 md:px-12">
<!-- Main Comparison Container -->
<div class="relative w-full max-w-6xl aspect-[16/9] rounded-xl overflow-hidden shadow-2xl group">
<!-- Background Image (After/Right) -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Vibrant high-contrast cinematic edit of a modern landscape" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBXIeaKJU4ldefd2QLblwig6Ee1jEo6xbzJE58LhZrvmYmOfQgSvGc-SPfFQ6LsVWm89OOX1z9vWvDHlwjGwkd3oJJeaiGASMIxuAUV_E4dq1p7F7WmLDW1nSn41Ukk9i51FefP-I5ZSjXeY-vOoUYw4czLDImDMKC2NnSKC8cHdchtDe6FaSfCZpgE-i203UIBHdlQ8S6QKD1LbvyaBH2DngHYlTK45Sn3fz0XeYij5WL2vSeN1k15GbXnzHyUZLiEMfMQO6v5HDYu");'>
<div class="absolute bottom-6 right-6 bg-black/40 backdrop-blur-md px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest text-primary border border-primary/30">
                    Edited Version
                </div>
</div>
<!-- Foreground Image (Before/Left) -->
<div class="compare-overlay" style="width: 50%;">
<div class="absolute inset-0 w-[200%] h-full bg-cover bg-center" data-alt="Original raw photo of a modern landscape" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAKjRFOIJ7ccpLKkXzE7MBrIlCZrwtudrsOfJCQUhaMBeguvnN4ZYI6h_DcPWmlVylxjx1U9Bj6CLHpJyr-qw5lHsc65SHA9HY6aPg9rZwTwsgFo2Es8PWvXvuq-qB1m_PiQg6mY3k2PIaoxgiRU9g67IyYFk79cxi3P4hLSb7WAKTQQ_doqNwdU7BTQrrZSoCTPQiiJnB-3gcu4tiEgQGDvS42tKC3aljywUAzv3tn_wbqjsJ5XrTEUmDcBzMoLGJ3cvTpyrfK3KCa");'>
<div class="absolute bottom-6 left-6 bg-black/40 backdrop-blur-md px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest text-slate-300 border border-slate-500/30">
                        Original Raw
                    </div>
</div>
</div>
<!-- Slider Handle -->
<div class="absolute top-0 bottom-0 left-1/2 -ml-0.5 w-1 bg-primary pointer-events-none z-10 shadow-[0_0_15px_rgba(199,255,56,0.5)]">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-10 rounded-full bg-primary flex items-center justify-center text-background-dark shadow-xl">
<span class="material-symbols-outlined font-bold">unfold_more_double</span>
</div>
</div>
</div>
<!-- Progress/Percentage Indicator -->
<div class="w-full max-w-2xl mt-8">
<div class="flex items-center justify-between mb-2">
<p class="text-sm font-medium text-slate-400">Comparison Balance</p>
<p class="text-sm font-bold text-primary">50%</p>
</div>
<div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full w-1/2 bg-primary"></div>
</div>
</div>
<!-- Decision Chips -->
<div class="flex flex-wrap justify-center gap-3 mt-10">
<button class="flex items-center gap-2 px-5 py-2 rounded-full bg-slate-800/50 border border-slate-700 hover:border-primary/50 transition-all text-sm font-medium">
<span class="material-symbols-outlined text-primary text-sm">colors_spark</span>
                Cleaner
            </button>
<button class="flex items-center gap-2 px-5 py-2 rounded-full bg-slate-800/50 border border-slate-700 hover:border-primary/50 transition-all text-sm font-medium">
<span class="material-symbols-outlined text-primary text-sm">bolt</span>
                Bolder
            </button>
<button class="flex items-center gap-2 px-5 py-2 rounded-full bg-slate-800/50 border border-slate-700 hover:border-primary/50 transition-all text-sm font-medium">
<span class="material-symbols-outlined text-primary text-sm">diamond</span>
                More Premium
            </button>
<button class="flex items-center gap-2 px-5 py-2 rounded-full bg-slate-800/50 border border-slate-700 hover:border-primary/50 transition-all text-sm font-medium">
<span class="material-symbols-outlined text-primary text-sm">trending_up</span>
                More Viral
            </button>
</div>
</main>
<!-- Footer Actions -->
<footer class="w-full p-6 md:p-10 border-t border-primary/5 bg-background-dark">
<div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-4 justify-center items-center">
<button class="w-full md:w-auto min-w-[200px] h-14 px-8 bg-primary text-background-dark rounded-xl font-bold text-lg hover:opacity-90 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                Keep this
            </button>
<button class="w-full md:w-auto min-w-[200px] h-14 px-8 bg-slate-800 text-white rounded-xl font-bold text-lg hover:bg-slate-700 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">account_tree</span>
                Branch this
            </button>
<button class="w-full md:w-auto min-w-[200px] h-14 px-8 bg-transparent text-slate-400 rounded-xl font-bold text-lg hover:text-white transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">arrow_back</span>
                Back to Studio
            </button>
</div>
</footer>
</body></html>
